spring.datasource.url=jdbc:h2:mem:easytraza_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.thymeleaf.cache=false
spring.main.allow-bean-definition-overriding=true
spring.mail.host=localhost
spring.mail.port=2525
app.uploads.perfil-path=target/test-uploads/perfils
app.ocr.documents-path=target/test-uploads/ocr
app.ocr.tessdata-path=src/test/resources/tessdata
app.ocr.language=cat+spa
