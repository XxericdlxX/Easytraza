<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{materies.llistat}">Listado de materias primas</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>
        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">
                        <div>
                            <h1 th:text="#{materies.llistat}">Listado de materias primas</h1>
                            <p th:text="#{materies.gestio}">Gestión de las materias primas del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/materies-primeres/crear}" class="btn btn-primary" th:text="#{materies.afegir}">Añadir materia prima</a>
                </div>

                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="table-wrapper" th:if="${!#lists.isEmpty(materiesPrimeres)}">
                    <table>
                        <thead>
                            <tr>
                                <th th:text="#{materies.id}">ID</th>
                                <th th:text="#{materies.nom}">Nombre</th>
                                <th th:text="#{materies.descripcio}">Descripción</th>
                                <th th:text="#{materies.accions}">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="materiaPrima : ${materiesPrimeres}">
                                <td th:text="${materiaPrima.id}"></td>
                                <td th:text="${materiaPrima.nom}"></td>
                                <td th:text="${materiaPrima.descripcio}"></td>
                                <td>
                                    <div class="actions">
                                        <a th:href="@{/web/materies-primeres/editar/{id}(id=${materiaPrima.id})}"
                                           class="btn btn-secondary"
                                           th:text="#{materies.editar}">Editar</a>
                                        <a th:href="@{/web/materies-primeres/eliminar/{id}(id=${materiaPrima.id})}"
                                           class="btn btn-danger"
                                           th:attr="onclick=|return confirm('${#messages.msg('materies.confirmar.eliminar')}');|"
                                           th:text="#{materies.eliminar}">Eliminar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message" th:if="${#lists.isEmpty(materiesPrimeres)}" th:text="#{materies.buit}">
                    No hay materias primas registradas.
                </div>
            </div>
        </div>
    </body>
</html>
