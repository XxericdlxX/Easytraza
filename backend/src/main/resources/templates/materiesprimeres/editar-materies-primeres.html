<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{materies.editar}">Editar materia prima</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="container">
            <div class="header-actions">
                <div class="logo-title">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                    <h1 th:text="#{materies.editar}">Editar materia prima</h1>
                </div>
                <div class="actions">
                    <a th:href="@{/web/materies-primeres/editar/{id}(id=${materiaPrima.id},lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">ES</a>
                    <a th:href="@{/web/materies-primeres/editar/{id}(id=${materiaPrima.id},lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">CA</a>
                </div>
            </div>

            <div class="form-card">
                <form th:action="@{/web/materies-primeres/actualitzar/{id}(id=${materiaPrima.id})}" th:object="${materiaPrima}" method="post">

                    <div th:if="${errorNegoci}" class="error-message" th:text="${errorNegoci}"></div>

                    <div class="form-group">
                        <label for="nom"><span th:text="#{materies.nom}">Nombre</span> <span class="required">*</span></label>
                        <input type="text" id="nom" th:field="*{nom}" required>
                        <div class="field-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                    </div>

                    <div class="form-group">
                        <label for="descripcio"><span th:text="#{materies.descripcio}">Descripción</span> <span class="required">*</span></label>
                        <input type="text" id="descripcio" th:field="*{descripcio}" required>
                        <div class="field-error" th:if="${#fields.hasErrors('descripcio')}" th:errors="*{descripcio}"></div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary" th:text="#{materies.guardar.canvis}">Guardar cambios</button>
                        <a th:href="@{/web/materies-primeres}" class="btn btn-secondary" th:text="#{materies.tornar}">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
