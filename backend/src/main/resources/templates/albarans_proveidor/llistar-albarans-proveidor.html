<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{albara.proveidor.llistat}">Listado de albaranes de proveedor</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">
                        <div>
                            <h1 th:text="#{albara.proveidor.llistat}">Listado de albaranes de proveedor</h1>
                            <p th:text="#{albara.proveidor.gestio}">Gestión de los albaranes de proveedor del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/albarans-proveidor/crear}" class="btn btn-primary" th:text="#{albara.proveidor.afegir}">Añadir albarán de proveedor</a>
                </div>

                <div th:if="${missatgeExit}" class="success-message" th:text="${missatgeExit}"></div>
                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="form-card" style="margin-bottom: 24px;">
                    <form th:action="@{/web/albarans-proveidor}" method="get" class="actions" style="align-items: end;">
                        <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0;">
                            <label for="proveidorCif" th:text="#{albara.proveidor.proveidor}">Proveedor</label>
                            <input type="text"
                                   id="proveidorCif"
                                   name="proveidorCif"
                                   th:value="${proveidorCif}"
                                   th:placeholder="#{albara.proveidor.cerca.proveidor}">
                        </div>

                        <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0;">
                            <label for="dataRecepcio" th:text="#{albara.proveidor.data}">Fecha</label>
                            <input type="date"
                                   id="dataRecepcio"
                                   name="dataRecepcio"
                                   th:value="${dataRecepcio}">
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <button type="submit" class="btn btn-secondary" th:text="#{albara.proveidor.cerca.boto}">Buscar</button>
                        </div>
                    </form>
                </div>

                <div class="table-wrapper" th:if="${!#lists.isEmpty(albarans)}">
                    <table>
                        <thead>
                            <tr>
                                <th th:text="#{albara.proveidor.id}">ID</th>
                                <th th:text="#{albara.proveidor.data}">Fecha</th>
                                <th th:text="#{albara.proveidor.proveidor}">Proveedor</th>
                                <th th:text="#{albara.proveidor.usuari}">Usuario receptor</th>
                                <th th:text="#{albara.proveidor.lots}">Lotes</th>
                                <th th:text="#{albara.proveidor.accions}">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="albara : ${albarans}">
                                <td th:text="${albara.id}"></td>
                                <td th:text="${albara.dataRecepcio}"></td>
                                <td th:text="${albara.proveidor.nom}"></td>
                                <td th:text="${albara.usuariReceptor != null ? albara.usuariReceptor.nom + ' ' + albara.usuariReceptor.cognoms : '-'}"></td>
                                <td th:text="${#lists.size(albara.lots)}"></td>
                                <td>
                                    <div class="actions">
                                        <a th:href="@{/web/albarans-proveidor/editar/{id}(id=${albara.id})}"
                                           class="btn btn-secondary"
                                           th:text="#{albara.proveidor.editar}">Editar</a>

                                        <a th:href="@{/web/albarans-proveidor/eliminar/{id}(id=${albara.id})}"
                                           class="btn btn-danger"
                                           th:text="#{albara.proveidor.eliminar}">Eliminar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message" th:if="${#lists.isEmpty(albarans)}" th:text="#{albara.proveidor.buit}">
                    No hay albaranes de proveedor registrados.
                </div>
            </div>
        </div>
    </body>
</html>
