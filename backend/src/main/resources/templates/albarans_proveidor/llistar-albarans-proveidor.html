<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{albara.proveidor.llistat}">Listado de albaranes de proveedor</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>

    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">

                        <div>
                            <h1 th:text="#{albara.proveidor.llistat}">
                                Listado de albaranes de proveedor
                            </h1>

                            <p th:text="#{albara.proveidor.gestio}">
                                Gestión de los albaranes de proveedor del sistema
                            </p>
                        </div>
                    </div>

                    <a th:href="@{/web/albarans-proveidor/crear}"
                       class="btn btn-primary"
                       th:text="#{albara.proveidor.afegir}">
                        Añadir albarán de proveedor
                    </a>
                </div>

                <div th:if="${missatgeExit}" class="success-message" th:text="${missatgeExit}"></div>
                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="form-card" style="margin-bottom: 24px;">
                    <form th:action="@{/web/albarans-proveidor}" method="get" class="actions filter-actions">
                        <div class="form-group filter-field">
                            <label for="proveidorCif" th:text="#{albara.proveidor.proveidor}">
                                Proveedor
                            </label>

                            <input type="text"
                                   id="proveidorCif"
                                   name="proveidorCif"
                                   th:value="${proveidorCif}"
                                   th:placeholder="#{albara.proveidor.cerca.proveidor}">
                        </div>

                        <div class="form-group filter-field">
                            <label for="dataRecepcio" th:text="#{albara.proveidor.data}">
                                Fecha
                            </label>

                            <input type="date"
                                   id="dataRecepcio"
                                   name="dataRecepcio"
                                   th:value="${dataRecepcio}">
                        </div>

                        <div class="form-group filter-button">
                            <button type="submit"
                                    class="btn btn-secondary"
                                    th:text="#{albara.proveidor.cerca.boto}">
                                Buscar
                            </button>
                        </div>
                    </form>
                </div>

                <div class="table-wrapper" th:if="${!#lists.isEmpty(albarans)}">
                    <table>
                        <thead>
                            <tr>
                                <th th:text="#{albara.proveidor.id}">ID</th>
                                <th th:text="#{albara.proveidor.data}">Fecha</th>
                                <th th:text="#{albara.proveidor.proveidor}">Proveedor</th>
                                <th th:text="#{albara.proveidor.usuari}">Usuario receptor</th>
                                <th th:text="#{albara.proveidor.lots}">Lotes</th>
                                <th th:text="#{albara.proveidor.accions}">Acciones</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="albara : ${albarans}">
                                <td th:text="${albara.id}">1</td>

                                <td th:text="${albara.dataRecepcio}">2026-04-24</td>

                                <td>
                                    <span th:if="${albara.proveidor != null}"
                                          th:text="${albara.proveidor.nom + ' (' + albara.proveidor.cif + ')'}">
                                        Proveedor
                                    </span>

                                    <span th:if="${albara.proveidor == null}">-</span>
                                </td>

                                <td>
                                    <span th:if="${albara.usuariReceptor != null}"
                                          th:text="${albara.usuariReceptor.nom + ' ' + albara.usuariReceptor.cognoms}">
                                        Usuario
                                    </span>

                                    <span th:if="${albara.usuariReceptor == null}">-</span>
                                </td>

                                <td th:text="${albara.lots != null ? #lists.size(albara.lots) : 0}">
                                    0
                                </td>

                                <td>
                                    <div class="actions-table">
                                        <a th:href="@{/web/albarans-proveidor/veure/{id}(id=${albara.id})}"
                                           class="btn btn-accent"
                                           th:text="#{albara.proveidor.veure}">
                                            Ver albarán
                                        </a>

                                        <a th:href="@{/web/albarans-proveidor/editar/{id}(id=${albara.id})}"
                                           class="btn btn-secondary"
                                           th:text="#{albara.proveidor.editar}">
                                            Editar
                                        </a>

                                        <a th:href="@{/web/albarans-proveidor/eliminar/{id}(id=${albara.id})}"
                                           class="btn btn-danger js-confirm-delete"
                                           th:text="#{albara.proveidor.eliminar}"
                                           th:attr="data-confirm-message=#{albara.proveidor.confirmar.eliminar}">
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message"
                     th:if="${#lists.isEmpty(albarans)}"
                     th:text="#{albara.proveidor.buit}">
                    No hay albaranes de proveedor registrados.
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.js-confirm-delete').forEach(function (link) {
                    link.addEventListener('click', function (event) {
                        const message = link.getAttribute('data-confirm-message') || '¿Seguro que quieres eliminar este albarán?';

                        if (!confirm(message)) {
                            event.preventDefault();
                        }
                    });
                });
            });
        </script>
    </body>
</html>
