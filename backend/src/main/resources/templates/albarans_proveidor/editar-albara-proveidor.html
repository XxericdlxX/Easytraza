<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{albara.proveidor.editar}">Editar albarán de proveedor</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div class="container">
            <div class="header-actions">
                <div class="logo-title">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                    <h1 th:text="#{albara.proveidor.editar}">Editar albarán de proveedor</h1>
                </div>

                <div class="actions">
                    <a th:href="@{/web/albarans-proveidor/editar/{id}(id=${albara.id},lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">ES</a>
                    <a th:href="@{/web/albarans-proveidor/editar/{id}(id=${albara.id},lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">CA</a>
                </div>
            </div>

            <div class="form-card" style="margin-bottom: 20px;">
                <div class="header-actions" style="margin-bottom: 0;">
                    <div>
                        <h2 th:text="#{albara.proveidor.mode.titol}">Modo de creación</h2>
                        <p th:text="#{albara.proveidor.mode.subtitol.editar}">Si necesitas rehacer la lectura del documento, puedes volver a procesarlo mediante OCR con imagen o PDF.</p>
                    </div>

                    <div class="actions">
                        <span class="badge" th:text="#{albara.proveidor.mode.manual}">Edición manual</span>
                        <a th:href="@{/web/albarans-proveidor/ocr}" class="btn btn-accent" th:text="#{albara.proveidor.mode.ocr}">Procesar con OCR / foto / PDF</a>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <form th:action="@{/web/albarans-proveidor/actualitzar/{id}(id=${albara.id})}" th:object="${albara}" method="post" novalidate>
                    <div th:if="${errorNegoci}" class="error-message" th:text="${errorNegoci}"></div>

                    <div class="form-group">
                        <label for="dataRecepcio">
                            <span th:text="#{albara.proveidor.data}">Fecha de recepción</span> <span class="required">*</span>
                        </label>
                        <input type="date"
                               id="dataRecepcio"
                               th:field="*{dataRecepcio}"
                               th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    </div>

                    <div class="form-group">
                        <label for="proveidorCif">
                            <span th:text="#{albara.proveidor.proveidor}">Proveedor</span> <span class="required">*</span>
                        </label>
                        <select id="proveidorCif" th:field="*{proveidorCif}">
                            <option value="">--</option>
                            <option th:each="proveidor : ${proveidors}"
                                    th:value="${proveidor.cif}"
                                    th:text="${proveidor.nom + ' (' + proveidor.cif + ')'}">
                            </option>
                        </select>
                    </div>

                    <div id="lots-container">
                        <div class="form-card lot-card" th:each="lot, stat : *{lots}" style="margin-top: 20px;">
                            <div class="header-actions" style="margin-bottom: 12px;">
                                <h3 class="lot-title" th:text="#{lot.proveidor.titol} + ' ' + ${stat.index + 1}">Lote 1</h3>

                                <div class="actions">
                                    <button type="button" class="btn btn-accent add-lot-inline-btn" th:text="#{lot.proveidor.afegir}">Añadir lote</button>
                                    <button type="button" class="btn btn-danger remove-lot-btn" th:text="#{lot.proveidor.eliminar}">Eliminar lote</button>
                                </div>
                            </div>

                            <input type="hidden" class="lot-id-field" th:name="${'lots[' + stat.index + '].id'}" th:value="${lot.id}">

                            <div class="form-group">
                                <label>
                                    <span th:text="#{lot.proveidor.codi}">Código/identificador de lote</span> <span class="required">*</span>
                                </label>
                                <input type="text"
                                       class="lot-codi-field"
                                       th:name="${'lots[' + stat.index + '].codiLot'}"
                                       th:value="${lot.codiLot}">
                            </div>

                            <div class="form-group">
                                <label>
                                    <span th:text="#{lot.proveidor.quantitat}">Cantidad</span> <span class="required">*</span>
                                </label>
                                <input type="number"
                                       min="1"
                                       class="lot-quantitat-field"
                                       th:name="${'lots[' + stat.index + '].quantitat'}"
                                       th:value="${lot.quantitat}">
                            </div>

                            <div class="form-group">
                                <label>
                                    <span th:text="#{lot.proveidor.materia}">Materia prima</span> <span class="required">*</span>
                                </label>
                                <select class="lot-materia-field" th:name="${'lots[' + stat.index + '].materiaPrimaId'}">
                                    <option value="">--</option>
                                    <option th:each="materia : ${materiesPrimeres}"
                                            th:value="${materia.id}"
                                            th:selected="${lot.materiaPrimaId == materia.id}"
                                            th:text="${materia.nom}">
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="actions" style="margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" th:text="#{albara.proveidor.guardar.canvis}">Guardar cambios</button>
                        <a th:href="@{/web/albarans-proveidor}" class="btn btn-secondary" th:text="#{albara.proveidor.tornar}">Volver</a>
                    </div>
                </form>
            </div>
        </div>

        <template id="lot-template">
            <div class="form-card lot-card" style="margin-top: 20px;">
                <div class="header-actions" style="margin-bottom: 12px;">
                    <h3 class="lot-title">Lote</h3>

                    <div class="actions">
                        <button type="button" class="btn btn-accent add-lot-inline-btn">Añadir lote</button>
                        <button type="button" class="btn btn-danger remove-lot-btn">Eliminar lote</button>
                    </div>
                </div>

                <input type="hidden" class="lot-id-field" value="">

                <div class="form-group">
                    <label>Código/identificador de lote <span class="required">*</span></label>
                    <input type="text" class="lot-codi-field">
                </div>

                <div class="form-group">
                    <label>Cantidad <span class="required">*</span></label>
                    <input type="number" min="1" class="lot-quantitat-field">
                </div>

                <div class="form-group">
                    <label>Materia prima <span class="required">*</span></label>
                    <select class="lot-materia-field">
                        <option value="">--</option>
                        <option th:each="materia : ${materiesPrimeres}"
                                th:value="${materia.id}"
                                th:text="${materia.nom}">
                        </option>
                    </select>
                </div>
            </div>
        </template>

        <script th:inline="javascript">
            const lotsContainer = document.getElementById('lots-container');
            const lotTemplate = document.getElementById('lot-template');
            const missatgeEliminarBloquejat = /*[[#{albara.proveidor.eliminar.lot.bloquejat}]]*/ 'Tienes información puesta, no puedes eliminar este lote.';

            function refreshLotIndexes() {
                const cards = lotsContainer.querySelectorAll('.lot-card');

                cards.forEach((card, index) => {
                    const title = card.querySelector('.lot-title');
                    if (title)
                        title.textContent = `Lote ${index + 1}`;

                    const hiddenId = card.querySelector('.lot-id-field');
                    const codiInput = card.querySelector('.lot-codi-field');
                    const quantitatInput = card.querySelector('.lot-quantitat-field');
                    const materiaSelect = card.querySelector('.lot-materia-field');

                    if (hiddenId)
                        hiddenId.name = `lots[${index}].id`;
                    if (codiInput)
                        codiInput.name = `lots[${index}].codiLot`;
                    if (quantitatInput)
                        quantitatInput.name = `lots[${index}].quantitat`;
                    if (materiaSelect)
                        materiaSelect.name = `lots[${index}].materiaPrimaId`;
                });

                refreshButtons();
            }

            function cardHasData(card) {
                const text = card.querySelector('.lot-codi-field')?.value?.trim() || "";
                const number = card.querySelector('.lot-quantitat-field')?.value?.trim() || "";
                const select = card.querySelector('.lot-materia-field')?.value?.trim() || "";
                return text !== "" || number !== "" || select !== "";
            }

            function refreshButtons() {
                const cards = lotsContainer.querySelectorAll('.lot-card');

                cards.forEach((card, index) => {
                    const addBtn = card.querySelector('.add-lot-inline-btn');
                    const removeBtn = card.querySelector('.remove-lot-btn');

                    if (addBtn)
                        addBtn.style.display = index === cards.length - 1 ? 'inline-block' : 'none';
                    if (removeBtn)
                        removeBtn.style.display = cards.length > 1 ? 'inline-block' : 'none';
                });
            }

            function addLot() {
                const clone = lotTemplate.content.cloneNode(true);
                lotsContainer.appendChild(clone);
                bindButtons();
                refreshLotIndexes();
            }

            function bindButtons() {
                lotsContainer.querySelectorAll('.add-lot-inline-btn').forEach(btn => {
                    btn.onclick = function () {
                        addLot();
                    };
                });

                lotsContainer.querySelectorAll('.remove-lot-btn').forEach(btn => {
                    btn.onclick = function () {
                        const card = btn.closest('.lot-card');
                        const cards = lotsContainer.querySelectorAll('.lot-card');

                        if (cards.length <= 1)
                            return;

                        if (cardHasData(card)) {
                            alert(missatgeEliminarBloquejat);
                            return;
                        }

                        card.remove();
                        refreshLotIndexes();
                    };
                });
            }

            bindButtons();
            refreshLotIndexes();
        </script>
    </body>
</html>
