<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <nav th:fragment="leftnav" class="leftnav">
            <div class="leftnav-top">
                <a th:href="@{/home}" class="leftnav-brand">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                    <span th:text="#{app.title}">EasyTraza</span>
                </a>
            </div>

            <div class="leftnav-menu">
                <div class="leftnav-section-title" th:text="#{nav.section.administracio}">
                    ADMINISTRACIÓN
                </div>

                <a th:href="@{/web/productes}"
                   th:classappend="${currentPath == '/web/productes'} ? ' active' : ''">
                    <span class="leftnav-icon">📦</span>
                    <span th:text="#{nav.productes}">Productos</span>
                </a>

                <a th:href="@{/web/usuaris}"
                   th:classappend="${currentPath == '/web/usuaris'} ? ' active' : ''">
                    <span class="leftnav-icon">👥</span>
                    <span th:text="#{nav.usuaris}">Usuarios</span>
                </a>

                <a th:href="@{/web/proveidors}"
                   th:classappend="${currentPath == '/web/proveidors'} ? ' active' : ''">
                    <span class="leftnav-icon">🚚</span>
                    <span th:text="#{nav.proveidors}">Proveedores</span>
                </a>

                <a th:href="@{/web/materies}"
                   th:classappend="${currentPath == '/web/materies'} ? ' active' : ''">
                    <span class="leftnav-icon">⚙️</span>
                    <span th:text="#{nav.materies}">Materias primas</span>
                </a>

                <a th:href="@{/web/clients}"
                   th:classappend="${currentPath == '/web/clients'} ? ' active' : ''">
                    <span class="leftnav-icon">🧾</span>
                    <span th:text="#{nav.clients}">Clientes</span>
                </a>

                <div class="leftnav-section-title" th:text="#{nav.section.operacions}">
                    OPERACIONES
                </div>

                <a th:href="@{/web/albarans-proveidor}"
                   th:classappend="${currentPath == '/web/albarans-proveidor'} ? ' active' : ''">
                    <span class="leftnav-icon">📄</span>
                    <span th:text="#{nav.albarans.proveidor}">Albaranes proveedor</span>
                </a>

                <a th:href="@{/web/albarans-client}"
                   th:classappend="${currentPath == '/web/albarans-client'} ? ' active' : ''">
                    <span class="leftnav-icon">📋</span>
                    <span th:text="#{nav.albarans.client}">Albaranes cliente</span>
                </a>

                <a th:href="@{/web/lots}"
                   th:classappend="${currentPath == '/web/lots'} ? ' active' : ''">
                    <span class="leftnav-icon">🏷️</span>
                    <span th:text="#{nav.lots}">Lotes</span>
                </a>
            </div>

            <div class="leftnav-bottom">
                <div class="leftnav-lang">
                    <a th:href="@{${#httpServletRequest.requestURI}(lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">
                        ES
                    </a>
                    <a th:href="@{${#httpServletRequest.requestURI}(lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">
                        CA
                    </a>
                </div>
            </div>
        </nav>
    </body>
</html>
