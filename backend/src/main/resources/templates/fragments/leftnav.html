<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <nav class="leftnav" th:fragment="leftnav">
            <div class="leftnav-top">
                <a th:href="@{/}" class="leftnav-brand">
                    <img th:src="@{/img/logo-easytraza.png}" alt="EasyTraza">
                    <span>EasyTraza</span>
                </a>
            </div>

            <div class="leftnav-menu">
                <div class="leftnav-section-title" th:text="#{nav.section.administracio}">
                    ADMINISTRACIÓN
                </div>

                <a th:href="@{/web/productes}">
                    <span class="leftnav-icon">🥖</span>
                    <span th:text="#{nav.productes}">Productos</span>
                </a>

                <a th:href="@{/web/usuaris}">
                    <span class="leftnav-icon">👤</span>
                    <span th:text="#{nav.usuaris}">Usuarios</span>
                </a>

                <a th:href="@{/web/proveidors}">
                    <span class="leftnav-icon">🚚</span>
                    <span th:text="#{nav.proveidors}">Proveedores</span>
                </a>

                <a th:href="@{/web/materies-primeres}">
                    <span class="leftnav-icon">🌾</span>
                    <span th:text="#{nav.materies}">Materias primas</span>
                </a>

                <a th:href="@{/web/clients}">
                    <span class="leftnav-icon">🤝</span>
                    <span th:text="#{nav.clients}">Clientes</span>
                </a>

                <div class="leftnav-section-title" th:text="#{nav.section.operacions}">
                    OPERACIONES
                </div>

                <a th:href="@{/web/albarans-proveidor}">
                    <span class="leftnav-icon">📄</span>
                    <span th:text="#{nav.albarans.proveidor}">Albaranes proveedor</span>
                </a>

                <a th:href="@{/web/albarans-client}">
                    <span class="leftnav-icon">🤝📄</span>
                    <span th:text="#{nav.albarans.client}">Albaranes cliente</span>
                </a>

                <a th:href="@{/web/produccio-lots}">
                    <span class="leftnav-icon">📊</span>
                    <span th:text="#{nav.produccio.lots}">Producción y lotes</span>
                </a>

                <a th:href="@{/web/lots}">
                    <span class="leftnav-icon">🏷️</span>
                    <span th:text="#{nav.lots}">Gestión de lotes</span>
                </a>
            </div>

            <div class="leftnav-bottom">
                <div class="leftnav-lang">
                    <a class="btn btn-secondary js-lang-link"
                       href="#"
                       data-lang="es">ES</a>

                    <a class="btn btn-secondary js-lang-link"
                       href="#"
                       data-lang="ca">CA</a>
                </div>
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    document.querySelectorAll('.js-lang-link').forEach(function (link) {
                        link.addEventListener('click', function (event) {
                            event.preventDefault();

                            const lang = link.getAttribute('data-lang');
                            const url = new URL(window.location.href);

                            url.searchParams.set('lang', lang);
                            window.location.assign(url.toString());
                        });
                    });
                });
            </script>
        </nav>
    </body>
</html>
