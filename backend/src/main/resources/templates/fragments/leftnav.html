<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body>
        <nav class="side-nav" th:fragment="topnav">
            <div class="side-nav-brand">
                <a th:href="@{/}" class="brand">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                    <span th:text="#{app.title}">EasyTraza</span>
                </a>
            </div>

            <div class="side-nav-links">
                <a th:href="@{/web/usuaris}"
                   th:classappend="${currentPath == '/web/usuaris'} ? ' active' : ''"
                   th:text="#{nav.usuaris}">Usuarios</a>

                <a th:href="@{/web/materies-primeres}"
                   th:classappend="${currentPath == '/web/materies-primeres'} ? ' active' : ''"
                   th:text="#{nav.materies}">Materias primas</a>

                <a th:href="@{/web/proveidors}"
                   th:classappend="${currentPath == '/web/proveidors'} ? ' active' : ''"
                   th:text="#{nav.proveidors}">Proveedores</a>
            </div>

            <div class="side-nav-lang">
                <a th:if="${currentPath != null}" th:href="@{${currentPath}(lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">ES</a>
                <a th:if="${currentPath != null}" th:href="@{${currentPath}(lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">CA</a>

                <a th:if="${currentPath == null}" th:href="@{/(lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">ES</a>
                <a th:if="${currentPath == null}" th:href="@{/(lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">CA</a>
            </div>
        </nav>
    </body>
</html>
