<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{proveidors.llistat}">Listado de proveedores</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>

    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">

                        <div>
                            <h1 th:text="#{proveidors.llistat}">Listado de proveedores</h1>
                            <p th:text="#{proveidors.gestio}">Gestión de proveedores del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/proveidors/crear}"
                       class="btn btn-primary"
                       th:text="#{proveidors.afegir}">
                        Añadir proveedor
                    </a>
                </div>

                <div th:if="${missatgeExit}" class="success-message" th:text="${missatgeExit}"></div>
                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="form-card" style="margin-bottom: 24px;">
                    <form th:action="@{/web/proveidors}" method="get" class="filter-actions">
                        <div class="filter-field form-group">
                            <label for="document" th:text="#{proveidors.filtre.document}">
                                CIF/NIF/NIE
                            </label>

                            <input type="text"
                                   id="document"
                                   name="document"
                                   th:value="${document}"
                                   th:placeholder="#{proveidors.filtre.document.placeholder}">
                        </div>

                        <div class="filter-field form-group">
                            <label for="nom" th:text="#{proveidors.nom}">
                                Nombre
                            </label>

                            <input type="text"
                                   id="nom"
                                   name="nom"
                                   th:value="${nom}"
                                   th:placeholder="#{proveidors.filtre.nom.placeholder}">
                        </div>

                        <div class="filter-field form-group">
                            <label for="telefon" th:text="#{proveidors.telefon}">
                                Teléfono
                            </label>

                            <input type="text"
                                   id="telefon"
                                   name="telefon"
                                   th:value="${telefon}"
                                   th:placeholder="#{proveidors.filtre.telefon.placeholder}">
                        </div>

                        <div class="filter-field form-group">
                            <label for="email" th:text="#{proveidors.email}">
                                Email
                            </label>

                            <input type="text"
                                   id="email"
                                   name="email"
                                   th:value="${email}"
                                   th:placeholder="#{proveidors.filtre.email.placeholder}">
                        </div>

                        <div class="filter-button form-group">
                            <button type="submit"
                                    class="btn btn-secondary"
                                    th:text="#{proveidors.cercar}">
                                Buscar
                            </button>
                        </div>

                        <div class="filter-button form-group">
                            <a th:href="@{/web/proveidors}"
                               class="btn btn-accent"
                               th:text="#{proveidors.netejar}">
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>

                <div class="table-wrapper" th:if="${proveidors != null && !#lists.isEmpty(proveidors)}">
                    <table class="proveidors-table">
                        <thead>
                            <tr>
                                <th th:text="#{proveidors.cif}">CIF/NIF/NIE</th>
                                <th th:text="#{proveidors.nom}">Nombre</th>
                                <th th:text="#{proveidors.telefon}">Teléfono</th>
                                <th th:text="#{proveidors.email}">Email</th>
                                <th th:text="#{proveidors.adreca}">Dirección</th>
                                <th th:text="#{proveidors.notes}">Notas</th>
                                <th th:text="#{proveidors.accions}">Acciones</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="proveidor : ${proveidors}">
                                <td class="nowrap-col" th:text="${proveidor.cif}">B12345678</td>
                                <td th:text="${proveidor.nom}">Proveedor</td>
                                <td class="nowrap-col" th:text="${proveidor.telefon != null && !proveidor.telefon.isBlank() ? proveidor.telefon : '-'}">-</td>
                                <td th:text="${proveidor.email != null && !proveidor.email.isBlank() ? proveidor.email : '-'}">-</td>
                                <td th:text="${proveidor.adreca != null && !proveidor.adreca.isBlank() ? proveidor.adreca : '-'}">-</td>
                                <td th:text="${proveidor.notes != null && !proveidor.notes.isBlank() ? proveidor.notes : '-'}">-</td>

                                <td class="actions-col">
                                    <div class="actions-table">
                                        <a th:href="@{/web/proveidors/editar/{cif}(cif=${proveidor.cif})}"
                                           class="btn btn-secondary"
                                           th:text="#{proveidors.editar}">
                                            Editar
                                        </a>

                                        <a th:href="@{/web/proveidors/eliminar/{cif}(cif=${proveidor.cif})}"
                                           class="btn btn-danger js-confirm-delete"
                                           th:attr="data-confirm-message=#{proveidors.confirmar.eliminar}"
                                           th:text="#{proveidors.eliminar}">
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message"
                     th:if="${proveidors == null || #lists.isEmpty(proveidors)}"
                     th:text="#{proveidors.buit}">
                    No hay proveedores registrados.
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.js-confirm-delete').forEach(function (link) {
                    link.addEventListener('click', function (event) {
                        const message = link.getAttribute('data-confirm-message') || '¿Seguro que quieres eliminar este proveedor?';

                        if (!confirm(message)) {
                            event.preventDefault();
                        }
                    });
                });
            });
        </script>
    </body>
</html>
