<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{proveidors.llistat}">Listado de proveedores</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">
                        <div>
                            <h1 th:text="#{proveidors.llistat}">Listado de proveedores</h1>
                            <p th:text="#{proveidors.gestio}">Gestión de los proveedores del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/proveidors/crear}" class="btn btn-primary" th:text="#{proveidors.afegir}">Añadir proveedor</a>
                </div>

                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="table-wrapper" th:if="${!#lists.isEmpty(proveidors)}">
                    <table class="proveidors-table">
                        <thead>
                            <tr>
                                <th th:text="#{proveidors.id}">CIF/NIF/NIE</th>
                                <th th:text="#{proveidors.nom}">Nombre</th>
                                <th th:text="#{proveidors.adreca}">Dirección</th>
                                <th th:text="#{proveidors.notes}">Notas/observaciones</th>
                                <th class="nowrap-col" th:text="#{proveidors.telefon}">Teléfono</th>
                                <th class="nowrap-col" th:text="#{proveidors.email}">Correo electrónico</th>
                                <th class="nowrap-col actions-col" th:text="#{proveidors.accions}">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="proveidor : ${proveidors}">
                                <td th:text="${proveidor.cif}"></td>
                                <td th:text="${proveidor.nom}"></td>
                                <td th:text="${proveidor.adreca}"></td>
                                <td th:text="${proveidor.notes != null && !proveidor.notes.isBlank() ? proveidor.notes : '-'}"></td>
                                <td class="nowrap-col" th:text="${proveidor.telefon != null && !proveidor.telefon.isBlank() ? proveidor.telefon : '-'}"></td>
                                <td class="nowrap-col" th:text="${proveidor.email != null && !proveidor.email.isBlank() ? proveidor.email : '-'}"></td>
                                <td class="nowrap-col actions-col">
                                    <div class="actions actions-table">
                                        <a th:href="@{/web/proveidors/editar/{cif}(cif=${proveidor.cif})}"
                                           class="btn btn-secondary"
                                           th:text="#{proveidors.editar}">Editar</a>
                                        <a th:href="@{/web/proveidors/eliminar/{cif}(cif=${proveidor.cif})}"
                                           class="btn btn-danger"
                                           th:attr="onclick=|return confirm('${#messages.msg('proveidors.confirmar.eliminar')}');|"
                                           th:text="#{proveidors.eliminar}">Eliminar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message" th:if="${#lists.isEmpty(proveidors)}" th:text="#{proveidors.buit}">
                    No hay proveedores registrados.
                </div>
            </div>
        </div>
    </body>
</html>
