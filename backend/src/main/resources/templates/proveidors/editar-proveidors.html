<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{proveidors.editar}">Editar proveedor</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div class="page-language-top">
            <div class="page-language-switch">
                <a class="btn btn-secondary js-page-lang-link"
                   href="#"
                   data-lang="es"
                   th:text="#{lang.es}">
                    ES
                </a>
                <a class="btn btn-secondary js-page-lang-link"
                   href="#"
                   data-lang="ca"
                   th:text="#{lang.ca}">
                    CA
                </a>
            </div>
        </div>

        <div class="container">
            <div class="header-actions">
                <div class="logo-title">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                    <h1 th:text="#{proveidors.editar}">Editar proveedor</h1>
                </div>
                <div class="actions">
                    <a th:href="@{/web/proveidors/editar/{cif}(cif=${proveidor.cif},lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">ES</a>
                    <a th:href="@{/web/proveidors/editar/{cif}(cif=${proveidor.cif},lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">CA</a>
                </div>
            </div>

            <div class="form-card">
                <form th:action="@{/web/proveidors/actualitzar/{cif}(cif=${proveidor.cif})}" th:object="${proveidor}" method="post" novalidate>

                    <div th:if="${errorNegoci}" class="error-message" th:text="${errorNegoci}"></div>

                    <div class="form-group">
                        <label for="cif"><span th:text="#{proveidors.cif}">CIF/NIF/NIE</span> <span class="required">*</span></label>
                        <input type="text" id="cif" th:field="*{cif}" readonly>
                        <div class="field-error" th:if="${#fields.hasErrors('cif')}" th:errors="*{cif}"></div>
                    </div>

                    <div class="form-group">
                        <label for="nom"><span th:text="#{proveidors.nom}">Nombre</span> <span class="required">*</span></label>
                        <input type="text" id="nom" th:field="*{nom}">
                        <div class="field-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                    </div>

                    <div class="form-group">
                        <label for="adreca"><span th:text="#{proveidors.adreca}">Dirección</span> <span class="required">*</span></label>
                        <input type="text" id="adreca" th:field="*{adreca}">
                        <div class="field-error" th:if="${#fields.hasErrors('adreca')}" th:errors="*{adreca}"></div>
                    </div>

                    <div class="form-group">
                        <label for="notes" th:text="#{proveidors.notes}">Notes/observacions</label>
                        <input type="text" id="notes" th:field="*{notes}">
                        <div class="field-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
                    </div>

                    <div class="form-group">
                        <label for="telefon" th:text="#{proveidors.telefon}">Teléfono</label>
                        <input type="text" id="telefon" th:field="*{telefon}">
                        <div class="field-error" th:if="${#fields.hasErrors('telefon')}" th:errors="*{telefon}"></div>
                    </div>

                    <div class="form-group">
                        <label for="email" th:text="#{proveidors.email}">Correo electrónico</label>
                        <input type="email" id="email" th:field="*{email}">
                        <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary" th:text="#{proveidors.guardar.canvis}">Guardar cambios</button>
                        <a th:href="@{/web/proveidors}" class="btn btn-secondary" th:text="#{proveidors.tornar}">Volver</a>
                    </div>
                </form>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.js-page-lang-link').forEach(function (link) {
                    link.addEventListener('click', function (event) {
                        event.preventDefault();

                        const lang = link.getAttribute('data-lang');
                        const url = new URL(window.location.href);

                        url.searchParams.set('lang', lang);
                        window.location.assign(url.toString());
                    });
                });
            });
        </script>

    </body>
</html>
