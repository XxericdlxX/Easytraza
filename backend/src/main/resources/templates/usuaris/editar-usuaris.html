<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Editar usuari</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="container">
            <div class="logo-title">
                <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                <h1>Editar usuari</h1>
            </div>

            <div class="form-card">
                <form th:action="@{/web/usuaris/actualitzar/{id}(id=${usuari.id})}" th:object="${usuari}" method="post">

                    <div th:if="${errorNegoci}" class="error-message" th:text="${errorNegoci}"></div>

                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" th:field="*{nom}">
                        <div class="field-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                    </div>

                    <div class="form-group">
                        <label for="cognoms">Cognoms</label>
                        <input type="text" id="cognoms" th:field="*{cognoms}">
                        <div class="field-error" th:if="${#fields.hasErrors('cognoms')}" th:errors="*{cognoms}"></div>
                    </div>

                    <div class="form-group">
                        <label for="rol">Rol</label>
                        <select id="rol" th:field="*{rol}">
                            <option value="">Selecciona un rol</option>
                            <option value="OPERARI">OPERARI</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                        <div class="field-error" th:if="${#fields.hasErrors('rol')}" th:errors="*{rol}"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Correu electrònic</label>
                        <input type="email" id="email" th:field="*{email}">
                        <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="form-group">
                        <label for="contrasenya">Contrasenya</label>
                        <input type="text" id="contrasenya" th:field="*{contrasenya}">
                        <div class="field-error" th:if="${#fields.hasErrors('contrasenya')}" th:errors="*{contrasenya}"></div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary">Guardar canvis</button>
                        <a th:href="@{/web/usuaris}" class="btn btn-secondary">Tornar</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
