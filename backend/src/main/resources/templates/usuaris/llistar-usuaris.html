<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{usuaris.llistat}">Listado de usuarios</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div th:replace="~{fragments/topnav :: topnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">
                        <div>
                            <h1 th:text="#{usuaris.llistat}">Listado de usuarios</h1>
                            <p th:text="#{usuaris.gestio}">Gestión de los usuarios del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/usuaris/crear}" class="btn btn-primary" th:text="#{usuaris.afegir}">Añadir usuario</a>
                </div>

                <div th:if="${missatgeExit}" class="success-message" th:text="${missatgeExit}"></div>
                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="table-wrapper" th:if="${!#lists.isEmpty(usuaris)}">
                    <table>
                        <thead>
                            <tr>
                                <th th:text="#{usuaris.id}">ID</th>
                                <th th:text="#{usuaris.nom}">Nombre</th>
                                <th th:text="#{usuaris.cognoms}">Apellidos</th>
                                <th th:text="#{usuaris.rol}">Rol</th>
                                <th th:text="#{usuaris.email}">Correo electrónico</th>
                                <th th:text="#{usuaris.accions}">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuari : ${usuaris}">
                                <td th:text="${usuari.id}"></td>
                                <td th:text="${usuari.nom}"></td>
                                <td th:text="${usuari.cognoms}"></td>
                                <td><span class="badge" th:text="#{|rol.${usuari.rol}|}">Rol</span></td>
                                <td th:text="${usuari.email}"></td>
                                <td>
                                    <div class="actions">
                                        <a th:href="@{/web/usuaris/editar/{id}(id=${usuari.id})}"
                                           class="btn btn-secondary"
                                           th:text="#{usuaris.editar}">Editar</a>

                                        <a th:if="${!@usuariService.isProtectedUser(usuari)}"
                                           th:href="@{/web/usuaris/eliminar/{id}(id=${usuari.id})}"
                                           class="btn btn-danger"
                                           th:attr="onclick=|return confirm('${#messages.msg('usuaris.confirmar.eliminar')}');|"
                                           th:text="#{usuaris.eliminar}">Eliminar</a>

                                        <button th:if="${@usuariService.isProtectedUser(usuari)}"
                                                type="button"
                                                class="btn btn-danger"
                                                disabled
                                                th:title="#{usuaris.superadmin.noeliminable}"
                                                th:text="#{usuaris.eliminar}">Eliminar</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message" th:if="${#lists.isEmpty(usuaris)}" th:text="#{usuaris.buit}">
                    No hay usuarios registrados.
                </div>
            </div>
        </div>
    </body>
</html>
