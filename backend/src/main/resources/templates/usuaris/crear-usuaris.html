<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crear usuari</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="container">
            <div class="logo-title">
                <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                <h1>Crear usuari</h1>
            </div>

            <div class="form-card">
                <form th:action="@{/web/usuaris/guardar}" th:object="${usuari}" method="post">

                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" th:field="*{nom}" required>
                    </div>

                    <div class="form-group">
                        <label for="cognoms">Cognoms</label>
                        <input type="text" id="cognoms" th:field="*{cognoms}" required>
                    </div>

                    <div class="form-group">
                        <label for="rol">Rol</label>
                        <select id="rol" th:field="*{rol}">
                            <option value="OPERARI">OPERARI</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="email">Correu electrònic</label>
                        <input type="email" id="email" th:field="*{email}" required>
                    </div>

                    <div class="form-group">
                        <label for="contrasenya">Contrasenya</label>
                        <input type="text" id="contrasenya" th:field="*{contrasenya}">
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                        <a th:href="@{/web/usuaris}" class="btn btn-secondary">Tornar</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
