<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{comandes.llistat}">Listado de comandas</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>

    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}"
                             alt="Logo EasyTraza"
                             class="list-page-logo">

                        <div>
                            <h1 th:text="#{comandes.llistat}">Listado de comandas</h1>
                            <p th:text="#{comandes.gestio}">Gestión de comandas del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/comandes/crear}"
                       class="btn btn-primary"
                       th:text="#{comandes.afegir}">
                        Añadir comanda
                    </a>
                </div>

                <div th:if="${missatgeExit}" class="success-message" th:text="${missatgeExit}"></div>
                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="form-card" style="margin-bottom: 24px;">
                    <form th:action="@{/web/comandes}"
                          method="get"
                          class="actions"
                          style="align-items: end;">

                        <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0;">
                            <label for="clientNif" th:text="#{comandes.client}">Cliente</label>
                            <input type="text"
                                   id="clientNif"
                                   name="clientNif"
                                   th:value="${clientNif}"
                                   th:placeholder="#{comandes.cerca.client}">
                        </div>

                        <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0;">
                            <label for="dataComanda" th:text="#{comandes.data}">Fecha solicitada</label>
                            <input type="date"
                                   id="dataComanda"
                                   name="dataComanda"
                                   th:value="${dataComanda}">
                        </div>

                        <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0;">
                            <label for="estat" th:text="#{comandes.estat}">Estado</label>
                            <select id="estat" name="estat">
                                <option value="" th:text="#{comandes.cerca.estat.tots}">
                                    Todos los estados
                                </option>
                                <option th:each="estatComanda : ${estatsComanda}"
                                        th:value="${estatComanda}"
                                        th:selected="${estat == estatComanda}"
                                        th:text="#{${'comandes.estat.' + estatComanda}}">
                                    Estado
                                </option>
                            </select>
                        </div>

                        <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0;">
                            <label for="producteId" th:text="#{comandes.producte}">Producto</label>
                            <select id="producteId" name="producteId">
                                <option value="" th:text="#{comandes.cerca.producte.tots}">
                                    Todos los productos
                                </option>
                                <option th:each="producte : ${productes}"
                                        th:value="${producte.id}"
                                        th:selected="${producteId == producte.id}"
                                        th:text="${producte.nom}">
                                    Producto
                                </option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <button type="submit"
                                    class="btn btn-secondary"
                                    th:text="#{comandes.cerca.boto}">
                                Buscar
                            </button>
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <a th:href="@{/web/comandes}"
                               class="btn btn-secondary"
                               th:text="#{comandes.netejar}">
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>

                <div class="table-wrapper" th:if="${!#lists.isEmpty(comandes)}">
                    <table>
                        <thead>
                            <tr>
                                <th th:text="#{comandes.id}">ID</th>
                                <th th:text="#{comandes.data}">Fecha solicitada</th>
                                <th th:text="#{comandes.client}">Cliente</th>
                                <th th:text="#{comandes.estat}">Estado</th>
                                <th th:text="#{comandes.albara.associat}">Albarán asociado</th>
                                <th th:text="#{comandes.accions}">Acciones</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="comanda : ${comandes}">
                                <td th:text="${comanda.id}">1</td>

                                <td th:text="${comanda.dataComanda}">2026-05-26</td>

                                <td th:text="${comanda.client != null ? comanda.client.nom + ' (' + comanda.client.nif + ')' : '-'}">
                                    Cliente
                                </td>

                                <td>
                                    <span class="status-pill"
                                          th:if="${comanda.estat != null}"
                                          th:text="#{${'comandes.estat.' + comanda.estat}}">
                                        Estado
                                    </span>
                                    <span th:if="${comanda.estat == null}">-</span>
                                </td>

                                <td>
                                    <a th:if="${comanda.albaraClient != null}"
                                       th:href="@{/web/albarans-client/veure/{id}(id=${comanda.albaraClient.id})}"
                                       class="link-comanda-albara"
                                       th:text="#{comandes.veure.albara}">
                                        Ver albarán
                                    </a>
                                    <span th:if="${comanda.albaraClient == null}"
                                          th:text="#{comandes.sense.albara}">
                                        Sin albarán
                                    </span>
                                </td>

                                <td>
                                    <div class="actions-table">
                                        <a th:href="@{/web/comandes/veure/{id}(id=${comanda.id})}"
                                           class="btn btn-accent"
                                           th:text="#{comandes.veure}">
                                            Ver
                                        </a>

                                        <a th:if="${comanda.albaraClient == null}"
                                           th:href="@{/web/comandes/editar/{id}(id=${comanda.id})}"
                                           class="btn btn-secondary"
                                           th:text="#{comandes.editar}">
                                            Editar
                                        </a>

                                        <form th:if="${comanda.albaraClient == null and comanda.estat != null and comanda.estat.name() != 'CANCELADA'}"
                                              th:action="@{/web/comandes/generar-albara/{id}(id=${comanda.id})}"
                                              method="post"
                                              class="inline-form js-confirm-form"
                                              th:attr="data-confirm-message=#{comandes.confirmar.generar.albara}">
                                            <button type="submit"
                                                    class="btn-comanda-generar btn-inline-small"
                                                    th:text="#{comandes.generar.albara}">
                                                Generar albarán
                                            </button>
                                        </form>

                                        <a th:if="${comanda.albaraClient == null}"
                                           th:href="@{/web/comandes/eliminar/{id}(id=${comanda.id})}"
                                           class="btn btn-danger js-confirm-delete"
                                           th:attr="data-confirm-message=#{comandes.confirmar.eliminar}"
                                           th:text="#{comandes.eliminar}">
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message"
                     th:if="${#lists.isEmpty(comandes)}"
                     th:text="#{comandes.buit}">
                    No hay comandas registradas.
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.js-confirm-delete').forEach(function (link) {
                    link.addEventListener('click', function (event) {
                        const message = link.getAttribute('data-confirm-message') || '¿Seguro que quieres eliminar esta comanda?';
                        if (!confirm(message)) {
                            event.preventDefault();
                        }
                    });
                });

                document.querySelectorAll('.js-confirm-form').forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        const message = form.getAttribute('data-confirm-message') || '¿Seguro que quieres generar un albarán de cliente?';
                        if (!confirm(message)) {
                            event.preventDefault();
                        }
                    });
                });
            });
        </script>
    </body>
</html>
