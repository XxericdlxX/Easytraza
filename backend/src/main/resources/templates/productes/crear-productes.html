<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{productes.crear}">Crear producto</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body>
        <div class="container">
            <div class="header-actions">
                <div class="logo-title">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza">
                    <h1 th:text="#{productes.crear}">Crear producto</h1>
                </div>
                <div class="actions">
                    <a th:href="@{/web/productes/crear(lang='es')}" class="btn btn-secondary" th:text="#{lang.es}">ES</a>
                    <a th:href="@{/web/productes/crear(lang='ca')}" class="btn btn-secondary" th:text="#{lang.ca}">CA</a>
                </div>
            </div>

            <div class="form-card">
                <form th:action="@{/web/productes/guardar}" th:object="${producte}" method="post" novalidate>

                    <div th:if="${errorNegoci}" class="error-message" th:text="${errorNegoci}"></div>

                    <div class="form-group">
                        <label for="nom">
                            <span th:text="#{productes.nom}">Nombre</span> <span class="required">*</span>
                        </label>
                        <input type="text" id="nom" th:field="*{nom}">
                        <div class="field-error" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                    </div>

                    <div class="form-group">
                        <label for="descripcio">
                            <span th:text="#{productes.descripcio}">Notas/observaciones</span> <span class="required">*</span>
                        </label>
                        <textarea id="descripcio" th:field="*{descripcio}" rows="4"></textarea>
                        <div class="field-error" th:if="${#fields.hasErrors('descripcio')}" th:errors="*{descripcio}"></div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary" th:text="#{productes.guardar}">Guardar</button>
                        <a th:href="@{/web/productes}" class="btn btn-secondary" th:text="#{productes.tornar}">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
