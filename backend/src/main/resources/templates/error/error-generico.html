<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{error.pagina.titol}">Error inesperado</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body class="login-body">
        <main class="login-page">
            <section class="login-card">
                <div class="login-brand">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="login-logo">
                    <div>
                        <h1 th:text="#{error.pagina.titol}">Error inesperado</h1>
                        <p th:text="#{error.pagina.subtitol}">Se ha producido un error al procesar la solicitud.</p>
                    </div>
                </div>

                <div class="error-message" th:text="${missatgeError} ?: #{error.generic}">
                    Se ha producido un error inesperado.
                </div>

                <div class="login-submit-row">
                    <a class="btn btn-primary login-submit" th:href="@{/}" th:text="#{error.pagina.tornar}">Volver al inicio</a>
                </div>
            </section>
        </main>
    </body>
</html>
