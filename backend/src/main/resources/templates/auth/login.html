<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{auth.login.titol}">Iniciar sesión</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>
    <body class="login-body">
        <main class="login-page">
            <section class="login-card">
                <div class="login-brand">
                    <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="login-logo">
                    <div>
                        <h1 th:text="#{auth.login.titol}">Iniciar sesión</h1>
                        <p th:text="#{auth.login.subtitol}">Accede al panel web de EasyTraza.</p>
                    </div>
                </div>

                <div class="success-message"
                     th:if="${param.logout}"
                     th:text="#{auth.logout.exit}">
                    Sesión cerrada correctamente.
                </div>

                <div class="success-message"
                     th:if="${param.resetOk}"
                     th:text="#{recuperacio.login.contrasenya.actualitzada}">
                    Contraseña actualizada correctamente.
                </div>

                <div class="error-message"
                     th:if="${param.error}"
                     th:text="#{auth.login.error}">
                    El correo o la contraseña no son correctos.
                </div>

                <form th:action="@{/login}" method="post" class="login-form">
                    <div class="form-group">
                        <label for="username" th:text="#{auth.login.email}">Correo electrónico</label>
                        <input type="email"
                               id="username"
                               name="username"
                               autocomplete="username"
                               th:placeholder="#{auth.login.email.placeholder}"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="password" th:text="#{auth.login.contrasenya}">Contraseña</label>
                        <input type="password"
                               id="password"
                               name="password"
                               autocomplete="current-password"
                               th:placeholder="#{auth.login.contrasenya.placeholder}"
                               required>
                    </div>

                    <div class="login-submit-row">
                        <button type="submit" class="btn btn-primary login-submit" th:text="#{auth.login.boto}">
                            Iniciar sesión
                        </button>

                        <div class="login-inline-locale" aria-label="Selector de idioma">
                            <a class="locale-pill" th:href="@{/login(lang='es')}" th:text="#{lang.es}">ES</a>
                            <a class="locale-pill" th:href="@{/login(lang='ca')}" th:text="#{lang.ca}">CA</a>
                        </div>
                    </div>
                </form>

                <div class="login-recovery-link">
                    <a th:href="@{/recuperar-contrasenya}" th:text="#{recuperacio.enllac}">
                        ¿Has olvidado tu contraseña?
                    </a>
                </div>
            </section>
        </main>
    </body>
</html>
