<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="#{clients.llistat}">Listado de clientes</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="icon" type="image/png" th:href="@{/img/logo-easytraza.png}">
    </head>

    <body>
        <div th:replace="~{fragments/leftnav :: leftnav}"></div>

        <div class="page-with-nav">
            <div class="container">
                <div class="list-header">
                    <div class="list-title-block">
                        <img th:src="@{/img/logo-easytraza.png}" alt="Logo EasyTraza" class="list-page-logo">

                        <div>
                            <h1 th:text="#{clients.llistat}">Listado de clientes</h1>
                            <p th:text="#{clients.gestio}">Gestión de clientes del sistema</p>
                        </div>
                    </div>

                    <a th:href="@{/web/clients/crear}"
                       class="btn btn-primary"
                       th:text="#{clients.afegir}">
                        Añadir cliente
                    </a>
                </div>

                <div th:if="${missatgeExit}" class="success-message" th:text="${missatgeExit}"></div>
                <div th:if="${missatgeError}" class="error-message" th:text="${missatgeError}"></div>

                <div class="form-card" style="margin-bottom: 24px;">
                    <form th:action="@{/web/clients}" method="get" class="filter-actions">
                        <div class="filter-field form-group">
                            <label for="document" th:text="#{clients.filtre.document}">
                                NIF/CIF/NIE
                            </label>

                            <input type="text"
                                   id="document"
                                   name="document"
                                   th:value="${document}"
                                   th:placeholder="#{clients.filtre.document.placeholder}">
                        </div>

                        <div class="filter-field form-group">
                            <label for="nom" th:text="#{clients.nom}">
                                Nombre
                            </label>

                            <input type="text"
                                   id="nom"
                                   name="nom"
                                   th:value="${nom}"
                                   th:placeholder="#{clients.filtre.nom.placeholder}">
                        </div>

                        <div class="filter-field form-group">
                            <label for="tipus" th:text="#{clients.tipus}">
                                Tipo
                            </label>

                            <select id="tipus" name="tipus">
                                <option value="" th:text="#{clients.filtre.tots.tipus}">
                                    Todos los tipos
                                </option>

                                <option th:each="tipusClient : ${tipusClients}"
                                        th:value="${tipusClient.name()}"
                                        th:selected="${tipusClient.name() == tipus}"
                                        th:text="#{${'clients.tipus.' + tipusClient.name().toLowerCase()}}">
                                    RESTAURANT
                                </option>
                            </select>
                        </div>

                        <div class="filter-field form-group">
                            <label for="telefon" th:text="#{clients.telefon}">
                                Teléfono
                            </label>

                            <input type="text"
                                   id="telefon"
                                   name="telefon"
                                   th:value="${telefon}"
                                   th:placeholder="#{clients.filtre.telefon.placeholder}">
                        </div>

                        <div class="filter-field form-group">
                            <label for="email" th:text="#{clients.email}">
                                Email
                            </label>

                            <input type="text"
                                   id="email"
                                   name="email"
                                   th:value="${email}"
                                   th:placeholder="#{clients.filtre.email.placeholder}">
                        </div>

                        <div class="filter-button form-group">
                            <button type="submit"
                                    class="btn btn-secondary"
                                    th:text="#{clients.cercar}">
                                Buscar
                            </button>
                        </div>

                        <div class="filter-button form-group">
                            <a th:href="@{/web/clients}"
                               class="btn btn-accent"
                               th:text="#{clients.netejar}">
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>

                <div class="table-wrapper" th:if="${clients != null && !#lists.isEmpty(clients)}">
                    <table>
                        <thead>
                            <tr>
                                <th th:text="#{clients.nif}">NIF/CIF/NIE</th>
                                <th th:text="#{clients.nom}">Nombre</th>
                                <th th:text="#{clients.tipus}">Tipo</th>
                                <th th:text="#{clients.telefon}">Teléfono</th>
                                <th th:text="#{clients.email}">Email</th>
                                <th th:text="#{clients.adreca}">Dirección</th>
                                <th th:text="#{clients.notes}">Notas/observaciones</th>
                                <th th:text="#{clients.accions}">Acciones</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="client : ${clients}">
                                <td th:text="${client.nif}">12345678A</td>

                                <td th:text="${client.nom}">Cliente</td>

                                <td>
                                    <span th:if="${client.tipusClient != null and client.tipusClient.name() == 'ALTRES'}"
                                          th:text="${client.tipusClientAltres != null && !client.tipusClientAltres.isBlank() ? client.tipusClientAltres : #messages.msg('clients.tipus.altres')}">
                                        Altres
                                    </span>

                                    <span th:if="${client.tipusClient != null and client.tipusClient.name() != 'ALTRES'}"
                                          th:text="#{${'clients.tipus.' + client.tipusClient.name().toLowerCase()}}">
                                        RESTAURANT
                                    </span>

                                    <span th:if="${client.tipusClient == null}">-</span>
                                </td>

                                <td th:text="${client.telefon != null && !client.telefon.isBlank() ? client.telefon : '-'}">
                                    -
                                </td>

                                <td th:text="${client.email != null && !client.email.isBlank() ? client.email : '-'}">
                                    -
                                </td>

                                <td th:text="${client.adreca != null && !client.adreca.isBlank() ? client.adreca : '-'}">
                                    -
                                </td>

                                <td th:text="${client.notes != null && !client.notes.isBlank() ? client.notes : '-'}">
                                    -
                                </td>

                                <td>
                                    <div class="actions-table">
                                        <a th:href="@{/web/clients/editar/{nif}(nif=${client.nif})}"
                                           class="btn btn-secondary"
                                           th:text="#{clients.editar}">
                                            Editar
                                        </a>

                                        <a th:href="@{/web/clients/eliminar/{nif}(nif=${client.nif})}"
                                           class="btn btn-danger js-confirm-delete"
                                           th:attr="data-confirm-message=#{clients.confirmar.eliminar}"
                                           th:text="#{clients.eliminar}">
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message"
                     th:if="${clients == null || #lists.isEmpty(clients)}"
                     th:text="#{clients.buit}">
                    No hay clientes registrados.
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.js-confirm-delete').forEach(function (link) {
                    link.addEventListener('click', function (event) {
                        const message = link.getAttribute('data-confirm-message') || '¿Seguro que quieres eliminar este cliente?';

                        if (!confirm(message)) {
                            event.preventDefault();
                        }
                    });
                });
            });
        </script>
    </body>
</html>
